<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AberOWL Central Server</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>AberOWL Ontology Servers</h1>
        <p>A list of currently registered and active AberOWL ontology instances.</p>

        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">Cross-Ontology DL Query</h3>
            </div>
            <div class="panel-body">
                <form id="dlQueryForm" onsubmit="return false;">
                    <div class="form-group">
                        <label for="dlQueryInput">Manchester Syntax Query:</label>
                        <input type="text" id="dlQueryInput" class="form-control" placeholder="e.g., 'has part' some 'cell nucleus'">
                        <p class="help-block">
                            Try: 
                            <a href="#" class="query-example">'has part' some nucleus</a>,
                            <a href="#" class="query-example">'part of' some 'apoptotic process'</a>,
                            <a href="#" class="query-example">'regulates' some 'calcium ion transport'</a>
                        </p>
                    </div>
                    <div class="btn-group" role="group">
                        <button type="submit" name="type" value="subclass" class="btn btn-primary">Subclasses</button>
                        <button type="submit" name="type" value="superclass" class="btn btn-primary">Superclasses</button>
                        <button type="submit" name="type" value="equivalent" class="btn btn-primary">Equivalent</button>
                    </div>
                </form>
            </div>
            <div id="dlQueryResultsContainer" style="display: none;">
                <div class="panel-footer">
                    <h4>Query Results</h4>
                    <ul id="dlQueryResultsList" class="list-group">
                        <!-- Results will be inserted here -->
                    </ul>
                </div>
            </div>
        </div>

        <div class="form-group">
            <input type="text" id="searchInput" class="form-control" placeholder="Search for ontologies...">
        </div>

        <table class="table table-bordered table-striped">
            <thead>
                <tr>
                    <th class="sortable" data-sort="ontology">Ontology <i class="glyphicon glyphicon-sort"></i></th>
                    <th class="sortable" data-sort="description">Description <i class="glyphicon glyphicon-sort"></i></th>
                    <th class="sortable" data-sort="class_count">Classes <i class="glyphicon glyphicon-sort"></i></th>
                    <th class="sortable" data-sort="property_count">Properties <i class="glyphicon glyphicon-sort"></i></th>
                    <th class="sortable" data-sort="status">Status <i class="glyphicon glyphicon-sort"></i></th>
                    <th>URL</th>
                </tr>
            </thead>
            <tbody id="serversTableBody">
                <!-- Rows will be inserted here by JavaScript -->
            </tbody>
        </table>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>
