version: '3.8'

services:
  central-server:
    build: .
    ports:
      - "${CENTRAL_SERVER_PORT:-8000}:80"
    volumes:
      # Mount the app directory for live-reloading during development
      - ./app:/code/app
    restart: always
    container_name: aberowl-central-server
    depends_on:
      - redis
    networks:
      - aberowl-net

  redis:
    image: "redis:alpine"
    container_name: aberowl-central-redis
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - aberowl-net

volumes:
  redis_data:

networks:
  aberowl-net:
    external: true
