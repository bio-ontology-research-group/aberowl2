services:
  ontology-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - ABEROWL_PUBLIC_URL=${ABEROWL_PUBLIC_URL}
      - ABEROWL_REGISTER=${ABEROWL_REGISTER}
      - ABEROWL_CENTRAL_URL=${ABEROWL_CENTRAL_URL}
      # Central infrastructure (provided by the central docker-compose stack)
      - CENTRAL_VIRTUOSO_URL=${CENTRAL_VIRTUOSO_URL}
      - CENTRAL_ES_URL=${CENTRAL_ES_URL}
      # elastic.groovy reads ELASTICSEARCH_URL; point it at the central instance
      - ELASTICSEARCH_URL=${CENTRAL_ES_URL}
      # Per-ontology identity and auth (single-ontology mode)
      - ONTOLOGY_ID=${ONTOLOGY_ID:-}
      - ABEROWL_SECRET_KEY=${ABEROWL_SECRET_KEY}
      # Reasoner configuration
      - REASONER_TYPE=${REASONER_TYPE:-elk}
      # Container identity (multi-ontology mode)
      - CONTAINER_ID=${CONTAINER_ID:-}
      # Ontology path: file, directory, or JSON config
      - ONTOLOGY_PATH=${ONTOLOGY_PATH:-}
    volumes:
      # Mount shared ontologies directory (multi-ontology mode)
      # or a specific ontology's directory (single-ontology mode)
      - ${ONTOLOGIES_HOST_PATH:-./data}:/data
      - ./aberowlapi:/app/aberowlapi
      # IndexElastic.groovy is called by triggerIndexing.groovy via subprocess
      - ./docker/scripts:/scripts
    # Multi-ontology mode: pass /data as directory
    # Single-ontology mode: pass specific file
    command: python3 /app/api_server.py ${ONTOLOGY_PATH:-/data/${ONTOLOGY_ID}_active.owl}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - aberowl-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${CONTAINER_MEMORY_LIMIT:-4g}
        reservations:
          memory: ${CONTAINER_MEMORY_RESERVATION:-1g}

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      - ontology-api
    volumes:
      - ./:/usr/share/nginx/html

networks:
  default:
  aberowl-net:
    external: true
