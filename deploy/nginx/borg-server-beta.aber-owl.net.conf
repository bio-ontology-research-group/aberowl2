# borg-server (87.106.144.182) - SSL termination for beta.aber-owl.net
# Deploy to: /etc/nginx/sites-available/beta.aber-owl.net
# Then: ln -s /etc/nginx/sites-available/beta.aber-owl.net /etc/nginx/sites-enabled/
# Then: certbot --nginx -d beta.aber-owl.net
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name beta.aber-owl.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name beta.aber-owl.net;

    # SSL certs will be added by certbot
    # ssl_certificate /etc/letsencrypt/live/beta.aber-owl.net/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/beta.aber-owl.net/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to frontend servers (KAUST internal) on port 27004
    location / {
        proxy_pass http://phenomebrowser.net:27004/aberowl-beta/;
        proxy_set_header Host phenomebrowser.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }
}
