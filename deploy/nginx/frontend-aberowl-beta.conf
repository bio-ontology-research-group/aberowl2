# frontend / frontend1 - location block for beta.aber-owl.net
# Add this block inside the existing phenomebrowser.net server block
# that listens on port 27004.
#
# Deploy to both:
#   frontend  (10.254.146.242): /etc/nginx/sites-available/phenomebrowser.net
#   frontend1 (10.254.147.211): /etc/nginx/sites-available/phenomebrowser.net

# --- Add inside the server { listen 27004; ... } block: ---

                        location = /aberowl-beta {
                                return 301 /aberowl-beta/;
                        }

                        location ^~ /aberowl-beta/ {
                                # Proxy to onto server (cbontsr01) central-server
                                proxy_pass http://10.67.24.207:8000/;
                                proxy_read_timeout 120s;
                                proxy_send_timeout 120s;
                                proxy_set_header Host               $host;
                                proxy_set_header X-Real-IP          $remote_addr;
                                proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
                                proxy_set_header X-Forwarded-Proto  $scheme;
                                proxy_set_header X-Forwarded-Host   beta.aber-owl.net;
                                proxy_buffering off;
                        }

                        # MCP ontology server (streamable HTTP).
                        # Backend listens on 127.0.0.1:8766 on onto; only
                        # this nginx hop can reach it.
                        location ^~ /aberowl-beta/mcp/ontology/ {
                                proxy_pass http://10.67.24.207:8766/;
                                proxy_http_version 1.1;
                                proxy_set_header Host               $host;
                                proxy_set_header X-Real-IP          $remote_addr;
                                proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
                                proxy_set_header X-Forwarded-Proto  $scheme;
                                proxy_set_header X-Forwarded-Host   beta.aber-owl.net;
                                # Streamable HTTP keeps the connection open
                                # for SSE-style chunks; disable buffering
                                # and set generous read timeout.
                                proxy_buffering off;
                                proxy_read_timeout 600s;
                                proxy_send_timeout 600s;
                        }

                        # MCP SPARQL server — kept disabled at the app level
                        # (ENABLE_MCP_SPARQL=false) until central Virtuoso
                        # is populated. Route stays here so flipping the
                        # flag is enough to enable.
                        location ^~ /aberowl-beta/mcp/sparql/ {
                                proxy_pass http://10.67.24.207:8767/;
                                proxy_http_version 1.1;
                                proxy_set_header Host               $host;
                                proxy_set_header X-Real-IP          $remote_addr;
                                proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
                                proxy_set_header X-Forwarded-Proto  $scheme;
                                proxy_set_header X-Forwarded-Host   beta.aber-owl.net;
                                proxy_buffering off;
                                proxy_read_timeout 600s;
                                proxy_send_timeout 600s;
                        }
